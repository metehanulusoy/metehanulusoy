name: Generate Snake Animation

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVGs and commit them to the output branch
        uses: Platane/snk@v3
        with:
          github_user_name: metehanulusoy
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#A855F7&color_dots=#1F1F23,#3b1f4d,#6b2fb3,#A855F7,#E0B0FF
            dist/snake-light.svg?palette=github-light&color_snake=#A855F7&color_dots=#f0f0f0,#dbb8ff,#A855F7,#6b2fb3,#3b1f4d

      - name: Push generated SVGs to the `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
